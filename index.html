<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IELTS Writing AI Teacher - Gemini Powered</title>
    <style>
        :root { --primary: #1a73e8; --bg: #f8f9fa; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); padding: 20px; line-height: 1.6; }
        .container { max-width: 800px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        header { text-align: center; margin-bottom: 30px; border-bottom: 2px solid #eee; padding-bottom: 20px; }
        textarea { width: 100%; padding: 15px; border: 1px solid #ddd; border-radius: 10px; font-size: 16px; box-sizing: border-box; resize: vertical; }
        button { background: var(--primary); color: white; border: none; padding: 12px 25px; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 10px; transition: 0.3s; }
        button:hover { background: #1557b0; }
        .result-box { background: #eef3ff; padding: 20px; border-radius: 10px; margin-top: 20px; white-space: pre-wrap; display: none; border-left: 5px solid var(--primary); font-size: 15px; }
        .loading { color: #666; font-style: italic; display: none; margin-top: 10px; }
        .api-key-section { background: #fff3cd; padding: 15px; border-radius: 8px; margin-bottom: 20px; }
        input[type="password"] { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        h3 { color: #2c3e50; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>IELTS Writing AI Teacher</h1>
        <p>Hỗ trợ bởi Google Gemini AI (v1)</p>
    </header>

    <div class="api-key-section">
        <label>🔑 Nhập Gemini API Key của bạn:</label>
        <input type="password" id="apiKey" placeholder="Dán API Key vào đây...">
    </div>

    <div class="section">
        <h3>1. Phân tích đề bài & Lập dàn ý</h3>
        <textarea id="topicInput" rows="3" placeholder="Nhập đề bài IELTS Writing Task 2..."></textarea>
        <button onclick="askGemini('outline')">AI Lập dàn ý & Ý tưởng</button>
        <div id="loadingOutline" class="loading">⏳ AI đang suy nghĩ...</div>
        <div id="resOutline" class="result-box"></div>
    </div>

    <hr style="margin: 40px 0; border: 0; border-top: 1px solid #eee;">

    <div class="section">
        <h3>2. Sửa lỗi & Nâng cấp câu văn</h3>
        <textarea id="sentenceInput" rows="3" placeholder="Nhập câu tiếng Anh bạn vừa viết..."></textarea>
        <button onclick="askGemini('feedback')">AI Nhận xét & Sửa lỗi</button>
        <div id="loadingFeedback" class="loading">⏳ AI đang chấm bài...</div>
        <div id="resFeedback" class="result-box"></div>
    </div>
</div>

<script>
    async function askGemini(type) {
        const key = document.getElementById('apiKey').value.trim();
        const topic = document.getElementById('topicInput').value.trim();
        const sentence = document.getElementById('sentenceInput').value.trim();
        
        if (!key) { 
            alert("Vui lòng nhập API Key trước!"); 
            return; 
        }

        const loadingDiv = type === 'outline' ? 'loadingOutline' : 'loadingFeedback';
        const resDiv = type === 'outline' ? 'resOutline' : 'resFeedback';
        
        // Kiểm tra dữ liệu đầu vào tùy theo loại
        if (type === 'outline' && !topic) { alert("Hãy nhập đề bài!"); return; }
        if (type === 'feedback' && !sentence) { alert("Hãy nhập câu văn cần sửa!"); return; }

        document.getElementById(loadingDiv).style.display = "block";
        document.getElementById(resDiv).style.display = "none";

        const promptText = type === 'outline' 
            ? `Bạn là chuyên gia IELTS. Hãy phân tích đề bài: "${topic}". Đưa ra dạng bài, dàn ý chi tiết 4 đoạn và 5 cụm từ collocations hay kèm nghĩa. Trả lời bằng tiếng Việt.`
            : `Hãy đóng vai giáo viên bản ngữ chuyên dạy IELTS, sửa lỗi ngữ pháp và viết lại câu này một cách chuyên nghiệp, tự nhiên hơn (level C1-C2): "${sentence}". Giải thích ngắn gọn lỗi sai nếu có bằng tiếng Việt.`;

        try {
            // Sử dụng endpoint v1 chuẩn xác
            const response = await fetch(`https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${key}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: promptText }] }]
                })
            });

            const result = await response.json();
            
            if (result.error) {
                alert("Lỗi từ Google: " + result.error.message);
            } else if (result.candidates && result.candidates[0].content) {
                const aiText = result.candidates[0].content.parts[0].text;
                document.getElementById(resDiv).innerText = aiText;
                document.getElementById(resDiv).style.display = "block";
            } else {
                alert("AI không trả về kết quả. Hãy thử lại hoặc kiểm tra lại đề bài.");
            }
        } catch (err) {
            alert("Lỗi kết nối mạng hoặc hệ thống. Vui lòng thử lại sau.");
            console.error(err);
        } finally {
            document.getElementById(loadingDiv).style.display = "none";
        }
    }
</script>

</body>
</html>
