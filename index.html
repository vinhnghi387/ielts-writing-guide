<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IELTS Writing AI Teacher - Gemini Powered</title>
    <style>
        :root { --primary: #1a73e8; --bg: #f8f9fa; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); padding: 20px; line-height: 1.6; }
        .container { max-width: 800px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        header { text-align: center; margin-bottom: 30px; border-bottom: 2px solid #eee; padding-bottom: 20px; }
        textarea { width: 100%; padding: 15px; border: 1px solid #ddd; border-radius: 10px; font-size: 16px; box-sizing: border-box; }
        button { background: var(--primary); color: white; border: none; padding: 12px 25px; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        .result-box { background: #eef3ff; padding: 20px; border-radius: 10px; margin-top: 20px; white-space: pre-wrap; display: none; border-left: 5px solid var(--primary); }
        .loading { color: #666; font-style: italic; display: none; }
        .api-key-section { background: #fff3cd; padding: 15px; border-radius: 8px; margin-bottom: 20px; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>IELTS Writing AI Teacher</h1>
        <p>Hỗ trợ bởi Google Gemini AI</p>
    </header>

    <div class="api-key-section">
        <label>🔑 Nhập Gemini API Key của bạn:</label>
        <input type="password" id="apiKey" placeholder="Dán API Key vào đây..." style="width: 100%; padding: 8px; margin-top: 5px;">
    </div>

    <div class="section">
        <h3>1. Phân tích đề bài & Lập dàn ý</h3>
        <textarea id="topicInput" rows="3" placeholder="Nhập đề bài IELTS Writing Task 2..."></textarea>
        <button onclick="askGemini('outline')">AI Lập dàn ý & Ý tưởng</button>
        <div id="loadingOutline" class="loading">AI đang suy nghĩ...</div>
        <div id="resOutline" class="result-box"></div>
    </div>

    <hr style="margin: 40px 0;">

    <div class="section">
        <h3>2. Sửa lỗi & Nâng cấp câu văn</h3>
        <textarea id="sentenceInput" rows="3" placeholder="Nhập câu tiếng Anh bạn vừa viết..."></textarea>
        <button onclick="askGemini('feedback')">AI Nhận xét & Sửa lỗi</button>
        <div id="loadingFeedback" class="loading">AI đang chấm bài...</div>
        <div id="resFeedback" class="result-box"></div>
    </div>
</div>

<script>
    async function askGemini(type) {
        const apiKey = document.getElementById('apiKey').value;
        if (!apiKey) { alert("Vui lòng nhập API Key trước!"); return; }

        let prompt = "";
        let targetDiv = "";
        let loadingDiv = "";

        if (type === 'outline') {
            const topic = document.getElementById('topicInput').value;
            prompt = `Bạn là chuyên gia IELTS Writing. Với đề bài: "${topic}", hãy: 1. Xác định dạng bài. 2. Đưa ra dàn ý 4 đoạn. 3. Gợi ý 3 cụm từ Collocations đắt giá theo chủ đề này.`;
            targetDiv = "resOutline";
            loadingDiv = "loadingOutline";
        } else {
            const sentence = document.getElementById('sentenceInput').value;
            prompt = `Bạn là giáo viên bản ngữ. Hãy sửa lỗi ngữ pháp cho câu này: "${sentence}". Sau đó viết lại một phiên bản hay hơn, sử dụng từ vựng học thuật cấp độ C1/C2 và giải thích ngắn gọn tại sao lại sửa như vậy.`;
            targetDiv = "resFeedback";
            loadingDiv = "loadingFeedback";
        }

        document.getElementById(loadingDiv).style.display = "block";
        document.getElementById(targetDiv).style.display = "none";

        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: prompt }] }]
                })
            });

            const data = await response.json();
            const aiResponse = data.candidates[0].content.parts[0].text;
            
            document.getElementById(targetDiv).innerText = aiResponse;
            document.getElementById(targetDiv).style.display = "block";
        } catch (error) {
            alert("Lỗi: Không thể kết nối với AI. Hãy kiểm tra lại API Key hoặc mạng.");
            console.error(error);
        } finally {
            document.getElementById(loadingDiv).style.display = "none";
        }
    }
</script>

</body>
</html>
